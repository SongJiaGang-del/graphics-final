<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Graphics Final · WebGL 场景</title>
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0d12; }
    #app { width: 100vw; height: 100vh; display: block; }

    /* 中央准星 */
    #crosshair {
      position: fixed; left: 50%; top: 50%;
      width: 8px; height: 8px; margin: -4px 0 0 -4px;
      border: 1px solid rgba(255,255,255,.7); border-radius: 50%;
      pointer-events: none; opacity: 0; transition: opacity .2s;
    }
    body.locked #crosshair { opacity: 1; }

    /* 点击提示遮罩 */
    #hint {
      position: fixed; inset: 0; display: flex;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 8px;
      color: #e6e9ef; font: 500 16px/1.5 system-ui, "Microsoft YaHei", sans-serif;
      background: rgba(8,10,16,.55); backdrop-filter: blur(2px);
      cursor: pointer; user-select: none; z-index: 5;
      pointer-events: none; /* 点击穿透到下方 canvas，触发 PointerLock */
    }
    #hint small { color: #9aa3b2; font-weight: 400; }
    body.locked #hint { display: none; }

    /* 右侧参数面板 */
    #panel {
      position: fixed; top: 16px; right: 16px; width: 240px; z-index: 10;
      background: rgba(18,21,28,.86); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.08); border-radius: 12px;
      padding: 14px 16px; color: #e6e9ef;
      font: 13px/1.5 system-ui, "Microsoft YaHei", sans-serif;
      box-shadow: 0 8px 30px rgba(0,0,0,.4);
    }
    #panel h2 { font-size: 13px; letter-spacing: .04em; text-transform: uppercase;
      color: #8b93a3; margin-bottom: 12px; font-weight: 600; }
    .row { margin-bottom: 14px; }
    .row label { display: flex; justify-content: space-between; margin-bottom: 6px; color: #c7cdd9; }
    .row label .val { color: #6ea8fe; font-variant-numeric: tabular-nums; }
    input[type=range] { width: 100%; accent-color: #6ea8fe; }
    .check { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .check input { width: 16px; height: 16px; accent-color: #6ea8fe; }
    .divider { height: 1px; background: rgba(255,255,255,.07); margin: 12px 0; }
    #stats { font-size: 11px; color: #707a8a; font-variant-numeric: tabular-nums; }
    #picked { font-size: 12px; color: #8fd49b; min-height: 18px; }
  </style>
</head>
<body>
  <canvas id="app"></canvas>
  <div id="crosshair"></div>

  <div id="hint">
    <div>点击画面进入场景</div>
    <small>WASD 移动 · 鼠标转动视角 · 左键拾取物体 · ESC 退出</small>
  </div>

  <!-- 参数面板由 ui.js 填充 -->
  <div id="panel"><h2>参数面板</h2><div id="panel-body"></div></div>

  <!-- Three.js 通过 CDN importmap 引入，无需打包 -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
